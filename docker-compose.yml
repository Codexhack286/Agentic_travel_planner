version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      # Relocate backend.db into a subfolder that we can mount as a persistent volume
      - DATABASE_URL=sqlite+aiosqlite:////app/backend/data/backend.db
      - CHROMA_PERSIST_DIRECTORY=/app/ai-travel-concierge/data/vector_db
    volumes:
      - backend_data:/app/backend/data
      - agent_data:/app/ai-travel-concierge/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_data:
  agent_data:
